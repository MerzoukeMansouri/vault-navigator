name: Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]
  schedule:
    # Run daily at 2am UTC
    - cron: '0 2 * * *'

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  dependency-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run dependency audit
        run: pnpm audit --audit-level moderate
        continue-on-error: false

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript', 'typescript']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate
          deny-licenses: GPL-3.0, AGPL-3.0
          comment-summary-in-pr: always

  npm-package-audit:
    name: NPM Package Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for known security issues
        run: |
          echo "Checking for known CVEs in dependencies..."
          pnpm audit --json > audit-results.json || true
          cat audit-results.json

          # Fail if critical or high vulnerabilities found
          if pnpm audit --audit-level high 2>&1 | grep -q "vulnerabilities"; then
            echo "❌ High or critical vulnerabilities found!"
            exit 1
          fi

          echo "✅ No high or critical vulnerabilities found"

  outdated-dependencies:
    name: Check Outdated Dependencies
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for outdated dependencies
        run: |
          echo "Checking for outdated dependencies..."
          pnpm outdated --long || true

          # Check specifically for Next.js security updates
          CURRENT_NEXT=$(pnpm list next --depth=0 --json | grep -o '"next":"[^"]*"' | cut -d'"' -f4)
          LATEST_NEXT=$(pnpm view next version)
          echo "Current Next.js: $CURRENT_NEXT"
          echo "Latest Next.js: $LATEST_NEXT"

          if [ "$CURRENT_NEXT" != "$LATEST_NEXT" ]; then
            echo "⚠️  Next.js update available: $CURRENT_NEXT → $LATEST_NEXT"
            echo "Please review and update to latest version for security patches"
          fi
